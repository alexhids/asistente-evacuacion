<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruta de Evacuación Segura</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        .card { border: 1px solid #333; padding: 15px; border-radius: 8px; background: #1e1e1e; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #333; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box;}
        button { width: 100%; padding: 15px; background: #d32f2f; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        #resultado { white-space: pre-wrap; line-height: 1.6; }
        .alerta { color: #ffeb3b; font-size: 0.9em; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>✈️ Asistente de Salida de Emergencia</h2>
        <p class="alerta">⚠ Información en tiempo real para zonas de conflicto.</p>
        <label>Código IATA del Aeropuerto (Ej: BEY para Beirut, KBP para Kiev):</label>
        <input type="text" id="aeropuerto" placeholder="Escribe el código de 3 letras...">
        <button onclick="buscarRuta()">BUSCAR VUELOS SEGUROS</button>
    </div>

    <div id="resultado" class="card" style="display:none;">
        <strong>Analizando rutas...</strong>
    </div>

    <script>
        async function buscarRuta() {
            const aero = document.getElementById('aeropuerto').value.toUpperCase();
            const resDiv = document.getElementById('resultado');
            resDiv.style.display = 'block';
            resDiv.innerHTML = "📡 Conectando con satélites y bases de datos de aviación...";

            try {
                // Aquí llamaremos a tu servidor (Paso 4)
                const response = await fetch('https://evacuation-assistant-rh3a.onrender.com/evacuacion', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ aeropuerto: aero })
                });
                const data = await response.json();
                resDiv.innerHTML = "<strong>Recomendación de la IA:</strong>\n\n" + data.plan;
            } catch (e) {
                resDiv.innerHTML = "❌ Error de conexión. Intente de nuevo.";
            }
        }
    </script>
</body>

</html>
