<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.E.I. | Sistema de Evacuación</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-overlay"></div>
    <div class="container">
        <header>
            <div class="logo">📡 S.E.I. PROTOCOL</div>
            <h1>Asistente de Evacuación</h1>
        </header>

        <main>
            <section class="card">
                <h3>✈️ Por Aeropuerto</h3>
                <input type="text" id="iataInput" placeholder="Código IATA (Ej: DXB)" maxlength="3">
                <button class="btn-primary" onclick="solicitarAyuda()">Analizar Vuelos</button>
            </section>

            <section class="card special">
                <h3>📍 Ruta Segura</h3>
                <input type="text" id="destinoInput" placeholder="Destino (Ej: Madrid)">
                <button class="btn-success" onclick="detectarUbicacion()">Detectar Ubicación</button>
            </section>
        </main>

        <div id="respuesta" class="response-box" style="display:none;">
            <div id="textoRespuesta"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
